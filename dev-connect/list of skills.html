*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.container{padding:1rem 0}
.search-bar{width:100%;padding:10px 14px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:1rem}
.search-bar:focus{outline:none;border-color:var(--color-border-primary)}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}
.tab{padding:6px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:20px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.15s}
.tab.active,.tab:hover{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.tab.active{font-weight:500}
.domains{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.domain-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
.domain-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.domain-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.domain-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.domain-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.skills-list{display:flex;flex-wrap:wrap;gap:6px}
.skill-tag{font-size:12px;padding:3px 10px;border-radius:20px;cursor:default}
.count{font-size:11px;color:var(--color-text-tertiary);margin-top:10px}
.no-results{text-align:center;padding:3rem;color:var(--color-text-secondary);font-size:14px}
</style>

const roles = [
  {id:"all", label:"All domains"},
  {id:"dev", label:"Software dev"},
  {id:"ai", label:"AI / ML"},
  {id:"data", label:"Data"},
  {id:"devops", label:"DevOps / Infra"},
  {id:"other", label:"Product & soft"},
];

let activeRole = "all";
let searchQuery = "";

const tabsEl = document.getElementById("tabs");
const domainsEl = document.getElementById("domains");
const searchEl = document.getElementById("search");

function renderTabs(){
  tabsEl.innerHTML = roles.map(r =>
    `<button class="tab ${r.id===activeRole?'active':''}" onclick="setRole('${r.id}')">${r.label}</button>`
  ).join("");
}

function renderDomains(){
  const q = searchQuery.toLowerCase();
  let filtered = data.filter(d => {
    if(activeRole !== "all" && d.role !== activeRole && d.role !== "all") return false;
    if(!q) return true;
    return d.label.toLowerCase().includes(q) || d.skills.some(s => s.toLowerCase().includes(q));
  });

  if(!filtered.length){
    domainsEl.innerHTML = `<div class="no-results" style="grid-column:1/-1">No skills found for "<strong>${q}</strong>"</div>`;
    return;
  }

  domainsEl.innerHTML = filtered.map(d => {
    const matchedSkills = q
      ? d.skills.filter(s => s.toLowerCase().includes(q))
      : d.skills;
    const showSkills = matchedSkills.slice(0, 30);
    return `
      <div class="domain-card">
        <div class="domain-header">
          <div class="domain-icon" style="background:${d.iconBg};color:${d.iconColor};font-size:12px;font-weight:500">${d.icon}</div>
          <div>
            <div class="domain-title">${d.label}</div>
            <div class="domain-sub">${d.sub}</div>
          </div>
        </div>
        <div class="skills-list">
          ${showSkills.map(s => `<span class="skill-tag" style="background:${d.tagBg};color:${d.tagText}">${s}</span>`).join("")}
        </div>
        <div class="count">${matchedSkills.length} skill${matchedSkills.length!==1?'s':''}</div>
      </div>`;
  }).join("");
}

function setRole(id){
  activeRole = id;
  renderTabs();
  renderDomains();
}

searchEl.addEventListener("input", e => {
  searchQuery = e.target.value;
  renderDomains();
});

renderTabs();
renderDomains();
</script>
