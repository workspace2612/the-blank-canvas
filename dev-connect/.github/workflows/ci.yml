name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["candidate-dashboard", "company-dashboard", "signup-signin", "skills-page", "resume-maker", "skill-extractor", "ATS-analyzer", "streak-extractor"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build project ${{ matrix.project }}
        run: npm --workspace ${{ matrix.project }} run build

      - name: Run lint for ${{ matrix.project }}
        run: npm --workspace ${{ matrix.project }} run lint

      - name: Run tests for ${{ matrix.project }}
        run: npm --workspace ${{ matrix.project }} run test

  python-ranking:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python ranking scripts
        run: python -m py_compile ranking-logic/*.py
